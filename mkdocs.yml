site_name: wavecat-sdk
site_description: Connect your own OpenAI-compatible backend (llama.cpp, vLLM) to wavecat.
site_url: https://sdkyuanpanda.github.io/wavecat-sdk/
repo_url: https://github.com/sdkyuanpanda/wavecat-sdk
repo_name: sdkyuanpanda/wavecat-sdk
copyright: Copyright &copy; 2026 Samuel Yuan

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - API reference: reference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true
